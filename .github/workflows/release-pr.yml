name: Release PR

# Manually open (or refresh) the single "release" pull request that promotes
# `develop` into `main`. The PR title and body are generated from the commits and
# merged PRs that have landed on `develop` since it last diverged from `main`.
#
# This workflow owns the GitHub API calls (compare range, commits, PRs, files,
# reference resolution); the parsing, grouping, sorting, and rendering live in the
# testable helper `scripts/release-pr-body.mjs` (see scripts/release-pr-body.test.mjs).
#
# Tooling note: this uses the default GITHUB_TOKEN. PRs created with GITHUB_TOKEN
# do NOT trigger other workflows (Deploy Vercel / Compliance won't run their
# `pull_request` jobs on this PR). Pushing to `main` after the merge still fires
# the production deploys normally. Swap in a PAT/App token if CI must run on the
# release PR itself.
on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  # `issues: read` lets us resolve ambiguous same-repo refs (bare `#132`) to an
  # issue-vs-PR via issues.get when building the audit trail.
  issues: read

concurrency:
  group: release-pr
  cancel-in-progress: true

jobs:
  release-pr:
    name: Open/update develop → main PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so the compare/SHA resolution below has everything.
          fetch-depth: 0

      - name: Build release PR
        uses: actions/github-script@v8
        with:
          script: |
            const BASE = 'main'
            const HEAD = 'develop'

            const { owner, repo } = context.repo
            const repoFullName = `${owner}/${repo}`

            // Load the testable body builder (ESM helper) via a file URL.
            const { pathToFileURL } = require('node:url')
            const helperPath = `${process.env.GITHUB_WORKSPACE}/scripts/release-pr-body.mjs`
            const { buildReleaseBody } = await import(pathToFileURL(helperPath).href)

            // 1. Resolve SHAs and the set of commits develop is ahead by.
            const compare = await github.paginate(
              github.rest.repos.compareCommitsWithBasehead,
              { owner, repo, basehead: `${BASE}...${HEAD}`, per_page: 100 },
              (response) => response.data.commits,
            )

            // paginate() only accumulates `commits`; fetch page 1 again for the
            // top-level metadata (base SHA, totals, file stats).
            const { data: meta } = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead: `${BASE}...${HEAD}`,
              per_page: 1,
            })

            const developBranch = await github.rest.repos.getBranch({ owner, repo, branch: HEAD })
            const baseBranch = await github.rest.repos.getBranch({ owner, repo, branch: BASE })

            const developSha = developBranch.data.commit.sha
            const mainSha = baseBranch.data.commit.sha
            const rawAheadCommits = meta.total_commits ?? compare.length

            if (rawAheadCommits === 0) {
              core.notice(`${HEAD} is not ahead of ${BASE}; nothing to release. No PR created.`)
              return
            }

            // The repo's auto-rewritten merge commits (commitlint ignores these
            // too) carry no human-meaningful change description.
            const MERGE_RE = /^chore\(merge\): merge [0-9a-f]{40} into [0-9a-f]{40}$/

            const allChangedFiles = new Map()
            for (const file of meta.files ?? []) {
              allChangedFiles.set(file.filename, file)
            }
            const rememberFiles = (files) => {
              for (const file of files ?? []) allChangedFiles.set(file.filename, file)
            }

            const normalizeAuthor = (commit, fullCommit) =>
              fullCommit.author?.login ?? commit.author?.login ?? commit.commit.author?.name ?? 'unknown'

            const contributorStats = new Map()
            const addContributorStats = (name, additions, deletions) => {
              const existing = contributorStats.get(name) ?? { additions: 0, deletions: 0 }
              existing.additions += additions ?? 0
              existing.deletions += deletions ?? 0
              contributorStats.set(name, existing)
            }

            const prByNumber = new Map()
            const directCommits = []
            const commitEntries = []

            // 2. Associate each commit with its merged PR(s), and collect file and
            // contributor metadata while each API object is still in hand.
            for (const commit of compare) {
              const subject = commit.commit.message.split('\n')[0]
              if (MERGE_RE.test(subject)) continue

              const { data: fullCommit } = await github.rest.repos.getCommit({
                owner,
                repo,
                ref: commit.sha,
              })
              const commitFiles = fullCommit.files ?? []
              rememberFiles(commitFiles)

              const author = normalizeAuthor(commit, fullCommit)
              const commitAdditions =
                fullCommit.stats?.additions ?? commitFiles.reduce((sum, file) => sum + (file.additions ?? 0), 0)
              const commitDeletions =
                fullCommit.stats?.deletions ?? commitFiles.reduce((sum, file) => sum + (file.deletions ?? 0), 0)
              addContributorStats(author, commitAdditions, commitDeletions)

              const associated = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: commit.sha,
              })
              const pr = associated.data.find((p) => p.base.ref === HEAD && p.merged_at)

              if (pr) {
                if (!prByNumber.has(pr.number)) {
                  const { data: fullPr } = await github.rest.pulls.get({
                    owner,
                    repo,
                    pull_number: pr.number,
                  })
                  const prFiles = await github.paginate(
                    github.rest.pulls.listFiles,
                    { owner, repo, pull_number: pr.number, per_page: 100 },
                    (response) => response.data,
                  )
                  rememberFiles(prFiles)

                  prByNumber.set(pr.number, {
                    number: pr.number,
                    title: fullPr.title,
                    body: fullPr.body ?? '',
                    author: fullPr.user?.login ?? author,
                    files: prFiles,
                    commits: [],
                  })
                }

                prByNumber.get(pr.number).commits.push({
                  sha: commit.sha,
                  subject,
                  message: commit.commit.message,
                })
              } else {
                directCommits.push({
                  sha: commit.sha,
                  subject,
                  message: commit.commit.message,
                  author,
                  files: commitFiles,
                })
              }

              commitEntries.push({ sha: commit.sha, subject, prNumber: pr?.number })
            }

            // 3. Resolve ambiguous `#n` refs to issue-vs-PR. Cached by the helper;
            // failures are non-fatal and surface as unresolved references.
            const resolveReference = async ({ owner: refOwner, repo: refRepo, number }) => {
              const { data } = await github.rest.issues.get({
                owner: refOwner,
                repo: refRepo,
                issue_number: number,
              })
              return data.pull_request ? 'pull' : 'issue'
            }

            // 4. Hand the snapshot to the testable builder.
            const { title, body, warnings } = await buildReleaseBody(
              {
                repoFullName,
                base: BASE,
                head: HEAD,
                developSha,
                mainSha,
                mergedPrs: [...prByNumber.values()],
                directCommits,
                commitEntries,
                contributors: [...contributorStats.entries()].map(([name, stats]) => ({
                  name,
                  additions: stats.additions,
                  deletions: stats.deletions,
                })),
                changedFiles: [...allChangedFiles.values()],
              },
              { resolveReference },
            )

            for (const warning of warnings) core.warning(warning)

            // 5. Create or update the open develop → main PR.
            const existing = await github.rest.pulls.list({
              owner,
              repo,
              base: BASE,
              head: `${owner}:${HEAD}`,
              state: 'open',
            })

            if (existing.data.length > 0) {
              const pull_number = existing.data[0].number
              await github.rest.pulls.update({ owner, repo, pull_number, title, body })
              core.notice(`Updated release PR #${pull_number}: ${existing.data[0].html_url}`)
            } else {
              const created = await github.rest.pulls.create({
                owner,
                repo,
                base: BASE,
                head: HEAD,
                title,
                body,
              })
              core.notice(`Created release PR #${created.data.number}: ${created.data.html_url}`)
            }
