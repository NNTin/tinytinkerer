name: Code Quality

# Static code-health gates that complement lint/typecheck/test:
#   - prettier → fails when any source file is not formatted (`pnpm format:check`)
#   - jscpd  → fails when copy/paste duplication exceeds the configured threshold
#   - knip   → fails on unused files and dependencies (unused exports are warnings)
# Both are baselined against the current codebase (see config/jscpd.json and
# config/knip.ts),
# so a green run means no *new* duplication or dead weight was introduced.
on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    name: format, jscpd & knip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Full install: the brand-asset generation knip runs needs sharp (an
      # allowlisted native binary).
      - uses: ./.github/actions/setup-workspace
        with:
          install: full

      # Fails when any non-ignored file is not Prettier-formatted. Runs first as
      # a cheap fail-fast gate (no generated artifacts required).
      - name: Format check (prettier)
        run: pnpm format:check

      - name: Tracked text file check
        run: pnpm check:text-files

      # Validates the release PR body parser (scripts/release-pr-body.mjs) so
      # changes to reference parsing / rendering are caught before release time.
      - name: Release PR body parser tests
        run: pnpm release-pr:test

      - name: Duplicate code check (jscpd)
        run: pnpm jscpd

      # `pnpm knip` generates the build-time modules first so their imports
      # resolve, then runs knip.
      - name: Dead code & dependency check (knip)
        run: pnpm knip
