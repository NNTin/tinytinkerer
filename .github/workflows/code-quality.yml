name: Code Quality

# Static code-health gates that complement lint/typecheck/test:
#   - jscpd  → fails when copy/paste duplication exceeds the configured threshold
#   - knip   → fails on unused files and dependencies (unused exports are warnings)
# Both are baselined against the current codebase (see .jscpd.json and knip.ts),
# so a green run means no *new* duplication or dead weight was introduced.
on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    name: jscpd & knip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      # Secure install: scriptless, then rebuild only the allowlisted native
      # binaries (sharp is needed by the brand-asset generation knip runs).
      - run: pnpm setup:workspace

      - name: Duplicate code check (jscpd)
        run: pnpm jscpd

      # `pnpm knip` generates the build-time modules first so their imports
      # resolve, then runs knip.
      - name: Dead code & dependency check (knip)
        run: pnpm knip
