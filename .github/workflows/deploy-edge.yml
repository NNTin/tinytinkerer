name: Deploy Edge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-edge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Edge Worker
        run: pnpm --filter @tinytinkerer/edge build

      - name: Prepare Worker Secrets
        id: secrets-file
        shell: bash
        env:
          OAUTH_GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
          OAUTH_GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          secrets_file="$RUNNER_TEMP/cloudflare-worker-secrets.env"

          {
            printf 'GITHUB_CLIENT_ID=%s\n' "$OAUTH_GITHUB_CLIENT_ID"
            printf 'GITHUB_CLIENT_SECRET=%s\n' "$OAUTH_GITHUB_CLIENT_SECRET"
          } > "$secrets_file"

          if [ -n "$TAVILY_API_KEY" ]; then
            printf 'TAVILY_API_KEY=%s\n' "$TAVILY_API_KEY" >> "$secrets_file"
          fi

          echo "path=$secrets_file" >> "$GITHUB_OUTPUT"

      - name: Deploy Worker Code and Secrets
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/edge
          command: deploy --secrets-file ${{ steps.secrets-file.outputs.path }}

      - name: Apply Worker Domain Configuration
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/edge
          command: triggers deploy
