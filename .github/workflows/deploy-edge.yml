name: Deploy Edge

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/edge/**'
      - 'packages/shared/contracts/**'
      - 'scripts/generate-edge-openapi.ts'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/deploy-edge.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-edge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Repo-integrity gates (Mermaid, Boundaries, Edge OpenAPI, Skill README) shared
  # with deploy-pages via the reusable workflow. Supply-chain checks live in
  # compliance.yml (the single source), so they are not repeated here.
  checks:
    name: Checks
    uses: ./.github/workflows/checks-reusable.yml

  # Lint & Typecheck / Test / Build matrix, shared with deploy-pages.
  ci:
    name: CI
    uses: ./.github/workflows/ci-reusable.yml

  # Runs the same Playwright suite as deploy-pages via the shared reusable workflow
  # (issue #254). deploy-edge is push-only, so this gates the edge deploy. The merged
  # Allure preview report is a PR concern owned by deploy-pages, so no report is built
  # here (the uploaded allure-results-e2e artifact is simply unused on edge pushes).
  e2e:
    name: E2E
    uses: ./.github/workflows/e2e-reusable.yml

  deploy:
    name: Deploy Cloudflare Worker
    needs: [checks, ci, e2e]
    runs-on: ubuntu-latest
    env:
      # Job-level so the inject/upload steps can guard on it in `if:`.
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      # wrangler reads these from the environment for `deploy`/`triggers`.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-workspace
        with:
          install: full

      - name: Prepare Worker Secrets
        id: secrets-file
        shell: bash
        env:
          OAUTH_GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
          OAUTH_GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
          LITELLM_KEY_MANAGEMENT_API_KEY: ${{ secrets.LITELLM_KEY_MANAGEMENT_API_KEY }}
          LITELLM_USER_KEY_SECRET: ${{ secrets.LITELLM_USER_KEY_SECRET }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_EDGE }}
        run: |
          secrets_file="$RUNNER_TEMP/cloudflare-worker-secrets.env"

          {
            printf 'GITHUB_CLIENT_ID=%s\n' "$OAUTH_GITHUB_CLIENT_ID"
            printf 'GITHUB_CLIENT_SECRET=%s\n' "$OAUTH_GITHUB_CLIENT_SECRET"
          } > "$secrets_file"

          if [ -n "$LITELLM_KEY_MANAGEMENT_API_KEY" ]; then
            printf 'LITELLM_KEY_MANAGEMENT_API_KEY=%s\n' "$LITELLM_KEY_MANAGEMENT_API_KEY" >> "$secrets_file"
          fi

          if [ -n "$LITELLM_USER_KEY_SECRET" ]; then
            printf 'LITELLM_USER_KEY_SECRET=%s\n' "$LITELLM_USER_KEY_SECRET" >> "$secrets_file"
          fi

          if [ -n "$TAVILY_API_KEY" ]; then
            printf 'TAVILY_API_KEY=%s\n' "$TAVILY_API_KEY" >> "$secrets_file"
          fi

          if [ -n "$SENTRY_DSN" ]; then
            printf 'SENTRY_DSN=%s\n' "$SENTRY_DSN" >> "$secrets_file"
          fi

          echo "path=$secrets_file" >> "$GITHUB_OUTPUT"

      - name: Compute Release
        id: release
        # Unified 7-char short SHA, matching the frontend buildHash so every
        # Sentry project shares one release identifier per commit.
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Resolve Deploy Environment
        id: flags
        shell: bash
        # `main` deploys the default (production) worker; `develop` targets the
        # named env in wrangler.jsonc (worker tinytinkerer-edge-develop at
        # api.dev.tiny.nntin.xyz). The env-scoped ALLOWED_ORIGINS and
        # SENTRY_ENVIRONMENT come from wrangler.jsonc, so the only CI difference
        # is this `--env` flag, threaded into every wrangler invocation below.
        run: |
          if [ "$GITHUB_REF" = "refs/heads/develop" ]; then
            echo "env_flag=--env develop" >> "$GITHUB_OUTPUT"
          else
            echo "env_flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Bundle Worker
        working-directory: apps/edge
        # Build the worker bundle and source maps (upload_source_maps) to dist
        # WITHOUT deploying, so debug IDs can be injected before it ships.
        run: pnpm exec wrangler deploy --dry-run --outdir dist ${{ steps.flags.outputs.env_flag }}

      - name: Inject Sentry Debug IDs
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        working-directory: apps/edge
        # Embeds matching debug IDs into dist/index.js and its source map so the
        # deployed worker carries them at runtime (robust de-minification).
        run: pnpm exec sentry-cli sourcemaps inject dist

      - name: Deploy Worker Code and Secrets
        working-directory: apps/edge
        # --no-bundle ships the already-built, debug-ID-injected dist/index.js
        # as-is; wrangler still applies name/routes/compatibility_flags/vars from
        # wrangler.jsonc and uploads the sibling source map to Cloudflare.
        run: >
          pnpm exec wrangler deploy dist/index.js --no-bundle
          --secrets-file ${{ steps.secrets-file.outputs.path }}
          --var SENTRY_RELEASE:${{ steps.release.outputs.sha }}
          ${{ steps.flags.outputs.env_flag }}

      - name: Upload Source Maps and Finalize Sentry Release
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        working-directory: apps/edge
        env:
          SENTRY_ORG: nntin-labs
          SENTRY_PROJECT: tinytinkerer-edge
        # Release matches the SENTRY_RELEASE var deployed above; commits are
        # resolved server-side via the connected GitHub integration.
        run: |
          REL='${{ steps.release.outputs.sha }}'
          pnpm exec sentry-cli releases new "$REL"
          pnpm exec sentry-cli releases set-commits "$REL" --auto
          pnpm exec sentry-cli sourcemaps upload --release "$REL" dist
          pnpm exec sentry-cli releases finalize "$REL"

      - name: Apply Worker Domain Configuration
        working-directory: apps/edge
        run: pnpm exec wrangler triggers deploy ${{ steps.flags.outputs.env_flag }}
