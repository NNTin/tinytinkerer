name: Deploy Edge

on:
  push:
    branches: [main]
    paths:
      - 'apps/edge/**'
      - 'packages/contracts/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/deploy-edge.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-edge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Mermaid & Boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: npm install --global @mermaid-js/mermaid-cli@11.12.0

      - name: Mermaid render check
        run: pnpm check:mermaid

      - name: Boundary check
        run: pnpm check:boundaries

  ci:
    name: ${{ matrix.task.name }}
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task:
          - name: Lint & Typecheck
            run: pnpm exec turbo run lint typecheck --concurrency=2
          - name: Test
            run: pnpm exec turbo run test --concurrency=1
          - name: Build
            run: pnpm exec turbo run build --concurrency=2
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm generate:brand-assets
      - run: pnpm generate:privacy-policy
      - run: TINYTINKERER_SKIP_BRAND_ASSET_GENERATION=1 ${{ matrix.task.run }}

  deploy:
    name: Deploy Cloudflare Worker
    needs: ci
    runs-on: ubuntu-latest
    env:
      # Job-level so the inject/upload steps can guard on it in `if:`.
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      # wrangler reads these from the environment for `deploy`/`triggers`.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prepare Worker Secrets
        id: secrets-file
        shell: bash
        env:
          OAUTH_GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
          OAUTH_GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_EDGE }}
        run: |
          secrets_file="$RUNNER_TEMP/cloudflare-worker-secrets.env"

          {
            printf 'GITHUB_CLIENT_ID=%s\n' "$OAUTH_GITHUB_CLIENT_ID"
            printf 'GITHUB_CLIENT_SECRET=%s\n' "$OAUTH_GITHUB_CLIENT_SECRET"
          } > "$secrets_file"

          if [ -n "$TAVILY_API_KEY" ]; then
            printf 'TAVILY_API_KEY=%s\n' "$TAVILY_API_KEY" >> "$secrets_file"
          fi

          if [ -n "$SENTRY_DSN" ]; then
            printf 'SENTRY_DSN=%s\n' "$SENTRY_DSN" >> "$secrets_file"
          fi

          echo "path=$secrets_file" >> "$GITHUB_OUTPUT"

      - name: Compute Release
        id: release
        # Unified 7-char short SHA, matching the frontend buildHash so every
        # Sentry project shares one release identifier per commit.
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Bundle Worker
        working-directory: apps/edge
        # Build the worker bundle and source maps (upload_source_maps) to dist
        # WITHOUT deploying, so debug IDs can be injected before it ships.
        run: pnpm exec wrangler deploy --dry-run --outdir dist

      - name: Inject Sentry Debug IDs
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        working-directory: apps/edge
        # Embeds matching debug IDs into dist/index.js and its source map so the
        # deployed worker carries them at runtime (robust de-minification).
        run: pnpm exec sentry-cli sourcemaps inject dist

      - name: Deploy Worker Code and Secrets
        working-directory: apps/edge
        # --no-bundle ships the already-built, debug-ID-injected dist/index.js
        # as-is; wrangler still applies name/routes/compatibility_flags/vars from
        # wrangler.jsonc and uploads the sibling source map to Cloudflare.
        run: >
          pnpm exec wrangler deploy dist/index.js --no-bundle
          --secrets-file ${{ steps.secrets-file.outputs.path }}
          --var SENTRY_RELEASE:${{ steps.release.outputs.sha }}

      - name: Upload Source Maps and Finalize Sentry Release
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        working-directory: apps/edge
        env:
          SENTRY_ORG: nntin-labs
          SENTRY_PROJECT: tinytinkerer-edge
        # Release matches the SENTRY_RELEASE var deployed above; commits are
        # resolved server-side via the connected GitHub integration.
        run: |
          REL='${{ steps.release.outputs.sha }}'
          pnpm exec sentry-cli releases new "$REL"
          pnpm exec sentry-cli releases set-commits "$REL" --auto
          pnpm exec sentry-cli sourcemaps upload --release "$REL" dist
          pnpm exec sentry-cli releases finalize "$REL"

      - name: Apply Worker Domain Configuration
        working-directory: apps/edge
        run: pnpm exec wrangler triggers deploy
