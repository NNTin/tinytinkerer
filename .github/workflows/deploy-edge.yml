name: Deploy Edge

on:
  push:
    branches: [main]
    paths:
      - 'apps/edge/**'
      - 'packages/contracts/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/deploy-edge.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-edge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Mermaid, Boundaries, Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: npm install --global @mermaid-js/mermaid-cli@11.12.0

      - name: Mermaid render check
        id: mermaid
        continue-on-error: true
        run: pnpm check:mermaid

      - name: Boundary check
        id: boundaries
        continue-on-error: true
        run: pnpm check:boundaries

      - name: Lint
        id: lint
        continue-on-error: true
        run: pnpm lint

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: pnpm typecheck

      - name: Test
        id: test
        continue-on-error: true
        run: pnpm test

      - name: Build
        id: build
        continue-on-error: true
        run: pnpm build

      - name: Fail if any checks failed
        if: always()
        run: |
          failed=0

          if [ "${{ steps.mermaid.outcome }}" != "success" ]; then
            echo "Mermaid render check failed."
            failed=1
          fi

          if [ "${{ steps.boundaries.outcome }}" != "success" ]; then
            echo "Boundary check failed."
            failed=1
          fi

          if [ "${{ steps.lint.outcome }}" != "success" ]; then
            echo "Lint failed."
            failed=1
          fi

          if [ "${{ steps.typecheck.outcome }}" != "success" ]; then
            echo "Typecheck failed."
            failed=1
          fi

          if [ "${{ steps.test.outcome }}" != "success" ]; then
            echo "Tests failed."
            failed=1
          fi

          if [ "${{ steps.build.outcome }}" != "success" ]; then
            echo "Build failed."
            failed=1
          fi

          exit "$failed"

  deploy:
    name: Deploy Cloudflare Worker
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.16.1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Edge Worker
        run: pnpm --filter @tinytinkerer/edge build

      - name: Prepare Worker Secrets
        id: secrets-file
        shell: bash
        env:
          OAUTH_GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
          OAUTH_GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          secrets_file="$RUNNER_TEMP/cloudflare-worker-secrets.env"

          {
            printf 'GITHUB_CLIENT_ID=%s\n' "$OAUTH_GITHUB_CLIENT_ID"
            printf 'GITHUB_CLIENT_SECRET=%s\n' "$OAUTH_GITHUB_CLIENT_SECRET"
          } > "$secrets_file"

          if [ -n "$TAVILY_API_KEY" ]; then
            printf 'TAVILY_API_KEY=%s\n' "$TAVILY_API_KEY" >> "$secrets_file"
          fi

          if [ -n "$SENTRY_DSN" ]; then
            printf 'SENTRY_DSN=%s\n' "$SENTRY_DSN" >> "$secrets_file"
          fi

          echo "path=$secrets_file" >> "$GITHUB_OUTPUT"

      - name: Deploy Worker Code and Secrets
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/edge
          command: deploy --secrets-file ${{ steps.secrets-file.outputs.path }} --var SENTRY_RELEASE:${{ github.sha }}

      - name: Apply Worker Domain Configuration
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/edge
          command: triggers deploy
