name: Compliance

# Lightweight, attribution-focused compliance. Proper SBOM/release provenance is
# out of scope until this project ships build artifacts; until then this workflow
# lets anyone generate an SBOM + third-party notices on demand (workflow_dispatch)
# and gates dependency changes against the license policy on pull requests and on
# pushes to the long-lived branches.
on:
  workflow_dispatch:
  # Weekly run so `pnpm audit` catches newly-disclosed advisories against
  # unchanged dependencies — the push/pull_request triggers below are path-filtered
  # to dependency files, so without this a fresh CVE would go unnoticed until the
  # next dependency change.
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [main, develop]
    paths: &compliance-paths
      - 'package.json'
      - 'apps/**/package.json'
      - 'packages/**/package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/generate-sbom.mjs'
      - 'scripts/generate-notices.mjs'
      - 'scripts/enforce-licenses.mjs'
      - 'scripts/check-exact-dependencies.mjs'
      - 'scripts/check-install-scripts.mjs'
      - 'scripts/dependency-status.mjs'
      - 'scripts/pin-direct-dependencies.mjs'
      - 'scripts/license-policy.mjs'
      - 'scripts/license-policy.test.mjs'
      - 'scripts/lib/dependency-licenses.mjs'
      - '.agent/README.md'
      - '.agent/skills/**'
      - '.github/workflows/compliance.yml'
  pull_request:
    paths: *compliance-paths

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: compliance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
          fail-on-scopes: runtime, development, unknown
          license-check: false
          # Advisories surfaced by apps/canvas's newly-added manifest. The first
          # four are @excalidraw/excalidraw transitive deps: the lodash-es ones (via
          # its bundled mermaid parser → langium → chevrotain) have no released fix,
          # and nanoid's predictable-ID issue needs a non-integer size Excalidraw
          # never passes. The last two are vite dev-server advisories (Windows-only
          # server.fs.deny bypass / launch-editor NTLM disclosure) that never ship —
          # already suppressed for `pnpm audit` in pnpm-workspace.yaml; they surface
          # here only because apps/canvas adds vite to the diff. Re-check on upgrades.
          allow-ghsas: GHSA-r5fr-rjxr-66jc, GHSA-f23m-r3pf-42rh, GHSA-xxjr-mmjv-4gpg, GHSA-mwcw-c2x4-8c55, GHSA-fx2h-pf6j-xcff, GHSA-v6wh-96g9-6wx3

  compliance:
    name: SBOM, Notices, License Policy & Supply Chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-workspace
        with:
          install: scriptless

      # Supply-chain gate — these checks live here as the single source (they were
      # previously duplicated into the deploy `checks` jobs). Skill README sync lives
      # in checks-reusable.yml (runs on every push/PR), so it is not repeated here.
      - name: Check exact dependency specifiers
        run: pnpm check:exact-dependencies

      - name: Check reviewed install lifecycle scripts
        run: pnpm check:install-scripts

      - name: Audit dependencies
        run: pnpm audit --audit-level=moderate

      - name: Generate SBOM (CycloneDX)
        run: pnpm compliance:sbom

      - name: Generate licenses report
        run: mkdir -p dist/compliance && pnpm licenses list --json -P > dist/compliance/licenses.json

      - name: Build third-party notices
        run: pnpm generate:notices

      # Upload before enforcement so the artifacts are always available for review,
      # even when the license policy gate fails the run.
      - name: Upload compliance artifacts
        uses: actions/upload-artifact@v6
        with:
          name: compliance-artifacts
          path: |
            dist/compliance/sbom.json
            dist/compliance/licenses.json
            dist/compliance/THIRD_PARTY_NOTICES.md
          if-no-files-found: error

      - name: Validate license policy parser
        run: pnpm compliance:test

      - name: Enforce license policy
        run: pnpm compliance:enforce
