name: Deploy Vercel

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  GIT_SHA: ${{ github.sha }}

jobs:
  # Repo-integrity gates (Mermaid, Boundaries, Edge OpenAPI, Skill README) shared
  # with deploy-edge via the reusable workflow. Supply-chain checks live in
  # compliance.yml (the single source), so they are not repeated here.
  checks:
    name: Checks
    uses: ./.github/workflows/checks-reusable.yml

  # Lint & Typecheck / Test / Build matrix, shared with deploy-edge. The Test shard
  # also emits the vitest Allure results consumed by the `report` job below, so the
  # suite runs once (no separate vitest-allure job).
  ci:
    name: CI
    uses: ./.github/workflows/ci-reusable.yml

  # Playwright e2e via the shared reusable workflow (issue #254 retired the standalone
  # e2e.yml). Runs on every trigger: on pushes it gates alongside the deploy jobs
  # (preserving the old e2e.yml push coverage); on PRs it also feeds the merged Allure
  # preview report. The suite is sharded, so it uploads one `allure-results-e2e-<shard>`
  # artifact per shard, which the report job below merges.
  e2e:
    name: E2E
    uses: ./.github/workflows/e2e-reusable.yml

  # Merge the vitest + e2e Allure results into one static HTML report (PR-only).
  # The vitest results come from the `ci` Test shard (which runs the suite once for
  # the gate and uploads its Allure results); the e2e results from the `e2e` job.
  # `needs` both but runs even when they fail (`!cancelled()`) so a failing suite
  # still produces a browsable report — the red check comes from the test jobs.
  report:
    name: Merge Allure report
    needs: [ci, e2e]
    if: >
      !cancelled() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # The CLI is invoked via `pnpm exec allure`; a scriptless install is enough
      # (allure-commandline has no lifecycle scripts and ships a ready-to-run bin).
      - uses: ./.github/actions/setup-workspace
        with:
          install: scriptless

      # allure-commandline is the Java-based Allure CLI. It vendors the Allure
      # distribution inside its npm tarball (no install-time binary download), but
      # the launcher runs `java`, so the report job needs a JRE on PATH.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Download vitest Allure results
        uses: actions/download-artifact@v7
        with:
          name: allure-results-vitest
          path: allure-results-vitest

      # The e2e suite is sharded, so merge every shard's Allure results into one
      # dir (UUID-named files never collide). `pattern` tolerates zero matches, so a
      # fully-empty e2e run degrades to a vitest-only report rather than failing.
      - name: Download e2e Allure results
        uses: actions/download-artifact@v7
        with:
          pattern: allure-results-e2e-*
          path: allure-results-e2e
          merge-multiple: true

      # Write the Environment / Executors / Categories metadata files into the results
      # dir BEFORE generating — those Overview widgets are populated only from these
      # fixed-name files at generate time, and neither reporter emits them (issue #258).
      # Written into allure-results-vitest only: `allure generate` reads the metadata
      # from every input dir, so one copy is enough (and one executor.json avoids a
      # duplicate Executors entry). GITHUB_SHA/SERVER_URL/REPOSITORY/RUN_ID/RUN_NUMBER
      # are provided by the runner; PR_NUMBER is passed through explicitly.
      - name: Write Allure metadata (environment / executors / categories)
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: pnpm metadata:allure allure-results-vitest

      # Regroup the Suites tab into a small fixed set of buckets BEFORE generating —
      # both reporters bake the tree into the parentSuite/suite/subSuite labels at
      # generate time, leaving a flat ~100-row top level (issue #260). This rewrites
      # those labels in both result dirs (parentSuite=bucket, suite=package,
      # subSuite=original group/browser); the browser/shard tags from #258 are kept.
      - name: Regroup Allure Suites into frontend / backend / core / plugins / shared / e2e
        run: pnpm regroup:allure-suites allure-results-vitest allure-results-e2e

      - name: Generate merged report
        run: pnpm exec allure generate allure-results-vitest allure-results-e2e -o test-report --clean

      # Guard against a generated-but-broken report. `if-no-files-found: error` on
      # the upload only catches a *fully empty* dir, so an `allure generate` that
      # emits a shell (no usable entry point) would otherwise ship a blank
      # /test-report/ on a green check. Require the report's entry point so a broken
      # generation reds THIS job at the source instead of publishing an empty page.
      - name: Verify report was generated
        run: |
          if [ ! -f test-report/index.html ]; then
            echo "::error::allure generate produced no test-report/index.html — the report is empty or malformed."
            exit 1
          fi

      - name: Upload report
        uses: actions/upload-artifact@v6
        with:
          name: test-report
          path: test-report
          if-no-files-found: error

  deploy-production:
    name: Deploy Production
    # e2e gates the deploy (no test report — that is preview-only).
    needs: [checks, ci, e2e]
    # Only `main` is the production deployment. `develop` pushes now also match
    # the push event, so the ref must be pinned here or develop would alias onto
    # the production domain.
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-workspace
        with:
          install: full

      - name: Install Vercel CLI
        # Pinned: vercel@54.7.0 ships a broken @vercel/build-utils ESM interop
        # ("Named export 'isPackageInstalled' not found") that fails `vercel build`.
        run: npm install --global vercel@54.6.1

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Deployment Artifacts
        # VITE_SENTRY_DSN activates runtime error reporting and SENTRY_AUTH_TOKEN
        # enables source map upload from the Sentry Vite plugin during the build
        # (see apps/web/vite.config.ts). VITE_SENTRY_ENVIRONMENT tags every event
        # so production, develop, and PR previews are distinguishable in Sentry.
        env:
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN_FRONTEND }}
          VITE_SENTRY_ENVIRONMENT: production
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        id: deploy
        run: |
          # --archive=tgz uploads one tarball instead of thousands of individual
          # files, staying under Vercel's free-plan per-file upload rate limit
          # (api-upload-free) — the merged /test-report/ adds many small files.
          url="$(vercel deploy --prebuilt --prod --archive=tgz --token="$VERCEL_TOKEN")"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Alias Production Domain
        run: vercel alias set "${{ steps.deploy.outputs.url }}" "tiny.nntin.xyz" --token="$VERCEL_TOKEN"

  deploy-develop:
    name: Deploy Develop
    # e2e gates the deploy (no test report — that is preview-only).
    needs: [checks, ci, e2e]
    # The develop frontend is a Vercel *preview* build (only `main` is the true
    # production deployment) manually aliased to the stable dev subdomain. It
    # pulls the Preview env scope, so VITE_EDGE_URL points at the develop edge —
    # the same edge PR previews use.
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-workspace
        with:
          install: full

      - name: Install Vercel CLI
        # Pinned: vercel@54.7.0 ships a broken @vercel/build-utils ESM interop
        # ("Named export 'isPackageInstalled' not found") that fails `vercel build`.
        run: npm install --global vercel@54.6.1

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build Deployment Artifacts
        # develop reports to Sentry under the `develop` environment. Preview env
        # vars (incl. VITE_EDGE_URL -> the develop edge) come from the pulled
        # Preview scope.
        env:
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN_FRONTEND }}
          VITE_SENTRY_ENVIRONMENT: develop
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        id: deploy
        run: |
          # --archive=tgz uploads one tarball instead of thousands of individual
          # files, staying under Vercel's free-plan per-file upload rate limit
          # (api-upload-free) — the merged /test-report/ adds many small files.
          url="$(vercel deploy --prebuilt --archive=tgz --token="$VERCEL_TOKEN")"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Alias Develop Domain
        run: vercel alias set "${{ steps.deploy.outputs.url }}" "dev.tiny.nntin.xyz" --token="$VERCEL_TOKEN"

  deploy-preview:
    name: Deploy Preview
    needs: [checks, ci, report]
    # `!cancelled()` so the preview (and the embedded /test-report/) still publishes
    # when tests fail — Allure is most useful exactly then, and the failing test jobs
    # keep the PR's checks red.
    #
    # A broken app BUILD no longer aborts the whole job: the `vercel build` step is
    # `continue-on-error`, and when it fails we fall back to publishing the standalone
    # Allure report on its own `*-report` preview domain (the report is most useful
    # exactly when the build/tests are broken). The full preview's happy path — build
    # succeeds, report bundled at <preview>/test-report/ — is unchanged. The real
    # build failure still surfaces: the final "Fail if app build failed" step below
    # re-reds this job, and the `ci`/`e2e` jobs stay red on their own.
    if: >
      !cancelled() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-workspace
        with:
          install: full

      - name: Install Vercel CLI
        # Pinned: vercel@54.7.0 ships a broken @vercel/build-utils ESM interop
        # ("Named export 'isPackageInstalled' not found") that fails `vercel build`.
        run: npm install --global vercel@54.6.1

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      # Pull the merged Allure report so `pnpm build` (via build-pages.mjs, keyed off
      # TINYTINKERER_TEST_REPORT_DIR) composes it into apps/host/dist/test-report and
      # it ships at <preview>/test-report/. Best-effort: if the report job did not
      # produce an artifact (e.g. e2e infra failure), build-pages skips /test-report/
      # rather than failing the deploy.
      - name: Download merged test report
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          name: test-report
          path: test-report

      # Derive the preview domain BEFORE deploying so both the full-preview and the
      # report-only fallback paths below can reference the slug/domain (the fallback
      # appends a `-report` marker to the same slug). This step has no side effects.
      - name: Derive Preview Domain
        id: preview-domain
        shell: bash
        run: |
          branch_slug="$(printf '%s' "${{ github.event.pull_request.head.ref }}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/-+/-/g; s/^-+//; s/-+$//')"
          if [ -z "$branch_slug" ]; then
            branch_slug="preview"
          fi

          suffix=".tiny.preview.nntin.xyz"
          prefix="pr-${{ github.event.pull_request.number }}-"

          # TLS certificate common names are capped at 64 characters, so the
          # whole domain (prefix + branch + suffix) must fit — truncating only
          # the branch to a fixed length is not enough for long branch names or
          # large PR numbers. Derive the branch budget from what's left after
          # the fixed parts. Target 63 to keep a one-character safety margin
          # under the hard 64-character limit.
          max_domain_length=63
          max_branch_length=$(( max_domain_length - ${#suffix} - ${#prefix} ))
          if [ "$max_branch_length" -lt 1 ]; then
            max_branch_length=1
          fi
          branch_slug="${branch_slug:0:$max_branch_length}"
          branch_slug="${branch_slug%-}"

          slug="${prefix}${branch_slug}"
          slug="${slug%-}"
          domain="$slug$suffix"

          # Report-only fallback domain: same slug with a `-report` marker, kept
          # within the same 63-char budget. The `-report` (7 chars) is reserved up
          # front and trimmed off the branch portion so the full domain still fits.
          report_max_branch_length=$(( max_branch_length - 7 ))
          if [ "$report_max_branch_length" -lt 1 ]; then
            report_max_branch_length=1
          fi
          report_branch_slug="${branch_slug:0:$report_max_branch_length}"
          report_branch_slug="${report_branch_slug%-}"
          report_slug="${prefix}${report_branch_slug}-report"
          report_domain="$report_slug$suffix"

          echo "slug=$slug" >> "$GITHUB_OUTPUT"
          echo "domain=$domain" >> "$GITHUB_OUTPUT"
          echo "report_slug=$report_slug" >> "$GITHUB_OUTPUT"
          echo "report_domain=$report_domain" >> "$GITHUB_OUTPUT"

      - name: Build Deployment Artifacts
        id: build
        # PR previews report to Sentry under a single shared `pr-preview`
        # environment. Preview env vars (incl. VITE_EDGE_URL -> the develop edge)
        # come from the pulled Preview scope; the Sentry build inputs are passed
        # here, matching the production build. TINYTINKERER_TEST_REPORT_DIR tells
        # build-pages.mjs to compose the downloaded report into /test-report/ — set
        # only here, so develop/production deploys never publish it.
        #
        # `continue-on-error`: a broken app build (this re-runs `pnpm build`) must
        # NOT abort the job, otherwise the standalone Allure report — already built
        # by the `report` job — would be lost. On failure, `steps.build.outcome` is
        # `failure` and the report-only fallback below takes over; on success the
        # original full-preview path runs unchanged. The failure is not swallowed:
        # the final "Fail if app build failed" step re-reds this job.
        continue-on-error: true
        env:
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN_FRONTEND }}
          VITE_SENTRY_ENVIRONMENT: pr-preview
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          TINYTINKERER_TEST_REPORT_DIR: test-report
        run: vercel build --token="$VERCEL_TOKEN"

      # ── Happy path: app build succeeded ─────────────────────────────────────────
      # Deploy + alias the full preview exactly as before; the report ships bundled
      # at <preview>/test-report/. Both steps are gated on the build succeeding so the
      # URLs and behavior are byte-for-byte identical to the pre-fallback workflow.
      - name: Deploy to Vercel
        id: deploy
        if: steps.build.outcome == 'success'
        run: |
          # --archive=tgz uploads one tarball instead of thousands of individual
          # files, staying under Vercel's free-plan per-file upload rate limit
          # (api-upload-free) — the merged /test-report/ adds many small files.
          url="$(vercel deploy --prebuilt --archive=tgz --token="$VERCEL_TOKEN")"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Alias Preview Domain
        id: alias
        if: steps.build.outcome == 'success'
        run: |
          domain="${{ steps.preview-domain.outputs.domain }}"
          vercel alias set "${{ steps.deploy.outputs.url }}" "$domain" --token="$VERCEL_TOKEN"
          echo "preview_url=https://$domain" >> "$GITHUB_OUTPUT"

      # ── Fallback path: app build failed ─────────────────────────────────────────
      # The full app preview is unavailable, but the standalone Allure report (the
      # `test-report` artifact downloaded above) still must be published. Assemble a
      # minimal Vercel Build Output API v3 directory (.vercel/output) that serves the
      # report verbatim, then deploy it `--prebuilt` and alias it to the dedicated
      # `*-report` preview domain so the report is always reachable.
      - name: Assemble report-only deployment
        id: report-build
        if: steps.build.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f test-report/index.html ]; then
            # No usable report (the report job produced none, or only a broken shell
            # with no entry point): nothing worth publishing. Skip the fallback deploy
            # rather than erroring — the build failure is still reported by the final
            # step below. Checking index.html (not just a non-empty dir) keeps this in
            # step with the report job's "Verify report was generated" guard.
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "No test-report/index.html found; skipping report-only deploy."
            exit 0
          fi

          # Build Output API v3: static files live under .vercel/output/static and
          # config.json must declare version 3. We serve the report under
          # /test-report/ so the URL path matches the bundled happy-path layout, and
          # add a root redirect so the bare domain lands on the report index.
          rm -rf .vercel/output
          mkdir -p .vercel/output/static/test-report
          cp -R test-report/. .vercel/output/static/test-report/
          cat > .vercel/output/config.json <<'JSON'
          {
            "version": 3,
            "routes": [
              { "src": "/", "status": 308, "headers": { "Location": "/test-report/" } }
            ]
          }
          JSON

          echo "published=true" >> "$GITHUB_OUTPUT"

      - name: Deploy report-only to Vercel
        id: report-deploy
        if: steps.build.outcome == 'failure' && steps.report-build.outputs.published == 'true'
        run: |
          # Same --prebuilt --archive=tgz flags as the full deploy: the report is many
          # small files, so the tarball upload stays under the free-plan rate limit.
          url="$(vercel deploy --prebuilt --archive=tgz --token="$VERCEL_TOKEN")"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Alias report-only Domain
        id: report-alias
        if: steps.build.outcome == 'failure' && steps.report-build.outputs.published == 'true'
        run: |
          domain="${{ steps.preview-domain.outputs.report_domain }}"
          vercel alias set "${{ steps.report-deploy.outputs.url }}" "$domain" --token="$VERCEL_TOKEN"
          echo "report_url=https://$domain" >> "$GITHUB_OUTPUT"

      # Always comment (build success OR failure) so the PR always carries the live
      # links. The body branches on which path published: the full preview when the
      # app build succeeded, or the standalone test-report-only deploy when it failed.
      # `if: always()` is needed because the build step is `continue-on-error` — its
      # `failure` outcome does not stop the job, but later step `if`s still must not
      # be skipped here.
      - name: Comment Preview Link
        if: always()
        uses: actions/github-script@v8
        env:
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          PREVIEW_URL: ${{ steps.alias.outputs.preview_url }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
          PREVIEW_DOMAIN: ${{ steps.preview-domain.outputs.domain }}
          REPORT_PUBLISHED: ${{ steps.report-build.outputs.published }}
          REPORT_URL: ${{ steps.report-alias.outputs.report_url }}
          REPORT_DEPLOYMENT_URL: ${{ steps.report-deploy.outputs.url }}
          REPORT_DOMAIN: ${{ steps.preview-domain.outputs.report_domain }}
        with:
          script: |
            const marker = '<!-- vercel-preview -->'
            const issue_number = context.payload.pull_request.number
            const comments = await github.paginate(github.rest.issues.listComments, {
              ...context.repo,
              issue_number,
              per_page: 100,
            })

            let body
            if (process.env.BUILD_OUTCOME === 'success') {
              // Happy path: full app preview with the report bundled at /test-report/.
              const previewUrl = process.env.PREVIEW_URL
              body = [
                marker,
                '## Vercel Preview',
                '',
                `- Web: ${previewUrl}/web/`,
                `- Mobile: ${previewUrl}/mobile/`,
                `- Widget: ${previewUrl}/widget/`,
                `- Canvas: ${previewUrl}/canvas/`,
                `- Test report: ${previewUrl}/test-report/`,
                '',
                `Preview: ${previewUrl}`,
                `Deployment: ${process.env.DEPLOYMENT_URL}`,
                `Domain: \`${process.env.PREVIEW_DOMAIN}\``,
                `Commit: \`${process.env.GITHUB_SHA}\``,
              ].join('\n')
            } else if (process.env.REPORT_PUBLISHED === 'true') {
              // Fallback path: app build failed, so only the standalone Allure report
              // was published (on its own *-report domain). Make this unambiguous so
              // the comment is never mistaken for a working full preview.
              const reportUrl = process.env.REPORT_URL
              body = [
                marker,
                '## Vercel Preview',
                '',
                '> [!WARNING]',
                '> The tinytinkerer **app build failed**, so the full preview ' +
                  '(Web / Mobile / Widget / Canvas) is unavailable ' +
                  'for this commit. ' +
                  'Only the Allure **test report** was published. See the ' +
                  'failing CI / E2E checks for the build & test failures.',
                '',
                `- Test report: ${reportUrl}/test-report/`,
                '',
                `Report: ${reportUrl}`,
                `Deployment: ${process.env.REPORT_DEPLOYMENT_URL}`,
                `Domain: \`${process.env.REPORT_DOMAIN}\``,
                `Commit: \`${process.env.GITHUB_SHA}\``,
              ].join('\n')
            } else {
              // App build failed AND no report artifact was available to publish.
              body = [
                marker,
                '## Vercel Preview',
                '',
                '> [!WARNING]',
                '> The tinytinkerer **app build failed** and no Allure test report ' +
                  'artifact was available to publish for this commit. See the failing ' +
                  'CI / E2E checks for details.',
                '',
                `Commit: \`${process.env.GITHUB_SHA}\``,
              ].join('\n')
            }

            const existingComment = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            )

            if (existingComment) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existingComment.id,
                body,
              })
              return
            }

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number,
              body,
            })

      # Re-red the job when the app build failed. `continue-on-error` on the build
      # step let the report-only fallback publish, but the build failure is real and
      # must NOT be swallowed: failing here keeps `deploy-preview` red (matching the
      # old behavior where a broken build blocked the deploy), while the `ci`/`e2e`
      # jobs stay red independently. Runs last so the report still publishes first.
      - name: Fail if app build failed
        if: steps.build.outcome == 'failure'
        run: |
          echo "::error::tinytinkerer app build failed; published the standalone Allure report only. See the CI / E2E checks for the underlying build & test failures."
          exit 1
