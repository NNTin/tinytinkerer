name: Deploy Vercel

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  GIT_SHA: ${{ github.sha }}

jobs:
  # Repo-integrity gates (Mermaid, Boundaries, Edge OpenAPI, Skill README) shared
  # with deploy-edge via the reusable workflow. Supply-chain checks live in
  # compliance.yml (the single source), so they are not repeated here.
  checks:
    name: Checks
    uses: ./.github/workflows/checks-reusable.yml

  # Lint & Typecheck / Test / Build matrix, shared with deploy-edge. The Test shard
  # also emits the vitest Allure results consumed by the `report` job below, so the
  # suite runs once (no separate vitest-allure job).
  ci:
    name: CI
    uses: ./.github/workflows/ci-reusable.yml

  # Playwright e2e via the shared reusable workflow (issue #254 retired the standalone
  # e2e.yml). Runs on every trigger: on pushes it gates alongside the deploy jobs
  # (preserving the old e2e.yml push coverage); on PRs it also feeds the merged Allure
  # preview report. The suite is sharded, so it uploads one `allure-results-e2e-<shard>`
  # artifact per shard, which the report job below merges.
  e2e:
    name: E2E
    uses: ./.github/workflows/e2e-reusable.yml

  # Merge the vitest + e2e Allure results into one static HTML report (PR-only).
  # The vitest results come from the `ci` Test shard (which runs the suite once for
  # the gate and uploads its Allure results); the e2e results from the `e2e` job.
  # `needs` both but runs even when they fail (`!cancelled()`) so a failing suite
  # still produces a browsable report — the red check comes from the test jobs.
  report:
    name: Merge Allure report
    needs: [ci, e2e]
    if: >
      !cancelled() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # The CLI is invoked via `pnpm exec allure`; a scriptless install is enough
      # (allure-commandline has no lifecycle scripts and ships a ready-to-run bin).
      - uses: ./.github/actions/setup-workspace
        with:
          install: scriptless

      # allure-commandline is the Java-based Allure CLI. It vendors the Allure
      # distribution inside its npm tarball (no install-time binary download), but
      # the launcher runs `java`, so the report job needs a JRE on PATH.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Download vitest Allure results
        uses: actions/download-artifact@v5
        with:
          name: allure-results-vitest
          path: allure-results-vitest

      # The e2e suite is sharded, so merge every shard's Allure results into one
      # dir (UUID-named files never collide). `pattern` tolerates zero matches, so a
      # fully-empty e2e run degrades to a vitest-only report rather than failing.
      - name: Download e2e Allure results
        uses: actions/download-artifact@v5
        with:
          pattern: allure-results-e2e-*
          path: allure-results-e2e
          merge-multiple: true

      - name: Generate merged report
        run: pnpm exec allure generate allure-results-vitest allure-results-e2e -o test-report --clean

      - name: Upload report
        uses: actions/upload-artifact@v5
        with:
          name: test-report
          path: test-report
          if-no-files-found: error

  deploy-production:
    name: Deploy Production
    # e2e gates the deploy (no test report — that is preview-only).
    needs: [checks, ci, e2e]
    # Only `main` is the production deployment. `develop` pushes now also match
    # the push event, so the ref must be pinned here or develop would alias onto
    # the production domain.
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-workspace
        with:
          install: full

      - name: Install Vercel CLI
        # Pinned: vercel@54.7.0 ships a broken @vercel/build-utils ESM interop
        # ("Named export 'isPackageInstalled' not found") that fails `vercel build`.
        run: npm install --global vercel@54.6.1

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Deployment Artifacts
        # VITE_SENTRY_DSN activates runtime error reporting and SENTRY_AUTH_TOKEN
        # enables source map upload from the Sentry Vite plugin during the build
        # (see apps/web/vite.config.ts). VITE_SENTRY_ENVIRONMENT tags every event
        # so production, develop, and PR previews are distinguishable in Sentry.
        env:
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN_FRONTEND }}
          VITE_SENTRY_ENVIRONMENT: production
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        id: deploy
        run: |
          # --archive=tgz uploads one tarball instead of thousands of individual
          # files, staying under Vercel's free-plan per-file upload rate limit
          # (api-upload-free) — the merged /test-report/ adds many small files.
          url="$(vercel deploy --prebuilt --prod --archive=tgz --token="$VERCEL_TOKEN")"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Alias Production Domain
        run: vercel alias set "${{ steps.deploy.outputs.url }}" "tiny.nntin.xyz" --token="$VERCEL_TOKEN"

  deploy-develop:
    name: Deploy Develop
    # e2e gates the deploy (no test report — that is preview-only).
    needs: [checks, ci, e2e]
    # The develop frontend is a Vercel *preview* build (only `main` is the true
    # production deployment) manually aliased to the stable dev subdomain. It
    # pulls the Preview env scope, so VITE_EDGE_URL points at the develop edge —
    # the same edge PR previews use.
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-workspace
        with:
          install: full

      - name: Install Vercel CLI
        # Pinned: vercel@54.7.0 ships a broken @vercel/build-utils ESM interop
        # ("Named export 'isPackageInstalled' not found") that fails `vercel build`.
        run: npm install --global vercel@54.6.1

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build Deployment Artifacts
        # develop reports to Sentry under the `develop` environment. Preview env
        # vars (incl. VITE_EDGE_URL -> the develop edge) come from the pulled
        # Preview scope.
        env:
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN_FRONTEND }}
          VITE_SENTRY_ENVIRONMENT: develop
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        id: deploy
        run: |
          # --archive=tgz uploads one tarball instead of thousands of individual
          # files, staying under Vercel's free-plan per-file upload rate limit
          # (api-upload-free) — the merged /test-report/ adds many small files.
          url="$(vercel deploy --prebuilt --archive=tgz --token="$VERCEL_TOKEN")"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Alias Develop Domain
        run: vercel alias set "${{ steps.deploy.outputs.url }}" "dev.tiny.nntin.xyz" --token="$VERCEL_TOKEN"

  deploy-preview:
    name: Deploy Preview
    needs: [checks, ci, report]
    # `!cancelled()` so the preview (and the embedded /test-report/) still publishes
    # when tests fail — Allure is most useful exactly then, and the failing test jobs
    # keep the PR's checks red. A broken BUILD still blocks the deploy via the
    # `vercel build` step below, which re-runs `pnpm build`.
    if: >
      !cancelled() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-workspace
        with:
          install: full

      - name: Install Vercel CLI
        # Pinned: vercel@54.7.0 ships a broken @vercel/build-utils ESM interop
        # ("Named export 'isPackageInstalled' not found") that fails `vercel build`.
        run: npm install --global vercel@54.6.1

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      # Pull the merged Allure report so `pnpm build` (via build-pages.mjs, keyed off
      # TINYTINKERER_TEST_REPORT_DIR) composes it into apps/host/dist/test-report and
      # it ships at <preview>/test-report/. Best-effort: if the report job did not
      # produce an artifact (e.g. e2e infra failure), build-pages skips /test-report/
      # rather than failing the deploy.
      - name: Download merged test report
        continue-on-error: true
        uses: actions/download-artifact@v5
        with:
          name: test-report
          path: test-report

      - name: Build Deployment Artifacts
        # PR previews report to Sentry under a single shared `pr-preview`
        # environment. Preview env vars (incl. VITE_EDGE_URL -> the develop edge)
        # come from the pulled Preview scope; the Sentry build inputs are passed
        # here, matching the production build. TINYTINKERER_TEST_REPORT_DIR tells
        # build-pages.mjs to compose the downloaded report into /test-report/ — set
        # only here, so develop/production deploys never publish it.
        env:
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN_FRONTEND }}
          VITE_SENTRY_ENVIRONMENT: pr-preview
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          TINYTINKERER_TEST_REPORT_DIR: test-report
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        id: deploy
        run: |
          # --archive=tgz uploads one tarball instead of thousands of individual
          # files, staying under Vercel's free-plan per-file upload rate limit
          # (api-upload-free) — the merged /test-report/ adds many small files.
          url="$(vercel deploy --prebuilt --archive=tgz --token="$VERCEL_TOKEN")"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Derive Preview Domain
        id: preview-domain
        shell: bash
        run: |
          branch_slug="$(printf '%s' "${{ github.event.pull_request.head.ref }}" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/-+/-/g; s/^-+//; s/-+$//')"
          if [ -z "$branch_slug" ]; then
            branch_slug="preview"
          fi

          suffix=".tiny.preview.nntin.xyz"
          prefix="pr-${{ github.event.pull_request.number }}-"

          # TLS certificate common names are capped at 64 characters, so the
          # whole domain (prefix + branch + suffix) must fit — truncating only
          # the branch to a fixed length is not enough for long branch names or
          # large PR numbers. Derive the branch budget from what's left after
          # the fixed parts. Target 63 to keep a one-character safety margin
          # under the hard 64-character limit.
          max_domain_length=63
          max_branch_length=$(( max_domain_length - ${#suffix} - ${#prefix} ))
          if [ "$max_branch_length" -lt 1 ]; then
            max_branch_length=1
          fi
          branch_slug="${branch_slug:0:$max_branch_length}"
          branch_slug="${branch_slug%-}"

          slug="${prefix}${branch_slug}"
          slug="${slug%-}"
          domain="$slug$suffix"

          echo "slug=$slug" >> "$GITHUB_OUTPUT"
          echo "domain=$domain" >> "$GITHUB_OUTPUT"

      - name: Alias Preview Domain
        id: alias
        run: |
          domain="${{ steps.preview-domain.outputs.domain }}"
          vercel alias set "${{ steps.deploy.outputs.url }}" "$domain" --token="$VERCEL_TOKEN"
          echo "preview_url=https://$domain" >> "$GITHUB_OUTPUT"

      - name: Comment Preview Link
        uses: actions/github-script@v8
        env:
          PREVIEW_URL: ${{ steps.alias.outputs.preview_url }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
          PREVIEW_DOMAIN: ${{ steps.preview-domain.outputs.domain }}
        with:
          script: |
            const marker = '<!-- vercel-preview -->'
            const issue_number = context.payload.pull_request.number
            const comments = await github.paginate(github.rest.issues.listComments, {
              ...context.repo,
              issue_number,
              per_page: 100,
            })

            const previewUrl = process.env.PREVIEW_URL
            const body = [
              marker,
              '## Vercel Preview',
              '',
              `- Web: ${previewUrl}/web/`,
              `- Mobile: ${previewUrl}/mobile/`,
              `- Widget: ${previewUrl}/widget/`,
              `- Test report: ${previewUrl}/test-report/`,
              '',
              `Preview: ${previewUrl}`,
              `Deployment: ${process.env.DEPLOYMENT_URL}`,
              `Domain: \`${process.env.PREVIEW_DOMAIN}\``,
              `Commit: \`${process.env.GITHUB_SHA}\``,
            ].join('\n')

            const existingComment = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            )

            if (existingComment) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existingComment.id,
                body,
              })
              return
            }

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number,
              body,
            })
