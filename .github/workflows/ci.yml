name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Mermaid, Boundaries, Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: npm install --global @mermaid-js/mermaid-cli@11.12.0

      - name: Mermaid render check
        id: mermaid
        continue-on-error: true
        run: pnpm check:mermaid

      - name: Boundary check
        id: boundaries
        continue-on-error: true
        run: pnpm check:boundaries

      - name: Lint
        id: lint
        continue-on-error: true
        run: pnpm lint

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: pnpm typecheck

      - name: Test
        id: test
        continue-on-error: true
        run: pnpm test

      - name: Fail if any checks failed
        if: always()
        run: |
          failed=0

          if [ "${{ steps.mermaid.outcome }}" != "success" ]; then
            echo "Mermaid render check failed."
            failed=1
          fi

          if [ "${{ steps.boundaries.outcome }}" != "success" ]; then
            echo "Boundary check failed."
            failed=1
          fi

          if [ "${{ steps.lint.outcome }}" != "success" ]; then
            echo "Lint failed."
            failed=1
          fi

          if [ "${{ steps.typecheck.outcome }}" != "success" ]; then
            echo "Typecheck failed."
            failed=1
          fi

          if [ "${{ steps.test.outcome }}" != "success" ]; then
            echo "Tests failed."
            failed=1
          fi

          exit "$failed"
