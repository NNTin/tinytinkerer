packages:
  - apps/*
  - packages/*/*
  - packages/content/renderers/*
  - packages/e2e

# Strict one-week age gate. Do not add minimumReleaseAgeExclude; if a newer package is needed, stop and ask a human.
minimumReleaseAge: 10080
# Human-approved exception (2026-06-18): dompurify@3.4.11 patches GHSA-cmwh-pvxp-8882
# (DOMPurify ships to the frontend for mermaid SVG sanitization, so this is a real
# fix, not a suppression). 3.4.11 was published 2026-06-17, younger than the 7-day
# gate above; a human reviewed and approved the early bump. Remove this exclude once
# 3.4.11 clears the age gate (~2026-06-24).
minimumReleaseAgeExclude:
  - dompurify
saveExact: true
auditLevel: moderate
# Temporary suppression: GHSA-gv7w-rqvm-qjhr (esbuild) is only patched in
# esbuild@0.28.1 (published 2026-06-11), which is younger than the 7-day age
# gate above. The advisory affects esbuild's Deno binary download path
# (NPM_CONFIG_REGISTRY); this repo only uses esbuild under Node via tsx and
# wrangler, so the exploit path is not reachable. Remove this entry once
# esbuild@0.28.1 clears the age gate (~2026-06-18) and esbuild is upgraded.
#
# The six entries below are all DEV/BUILD-only transitive advisories — none
# reaches the deployed Cloudflare Worker or the static Pages bundle — and the
# patched versions are blocked by the 7-day age gate above (bumping needs a human
# per the directive at the top of this file), so they are suppressed with a clear
# rationale rather than upgraded. Re-check once the patches clear the age gate.
#   - GHSA-96hv-2xvq-fx4p (ws, DoS): apps/edge>wrangler>miniflare>ws — the local
#     dev edge runtime only; never bundled into the deployed Worker.
#   - GHSA-fx2h-pf6j-xcff (vite, server.fs.deny bypass): apps/host>vite — Windows
#     only and a dev-server issue; the host compositor runs only in local dev.
#   - GHSA-v6wh-96g9-6wx3 (launch-editor via vite, NTLMv2 disclosure): Windows
#     only, dev-server editor-open path; not used in CI or production.
#   - GHSA-h67p-54hq-rp68 (js-yaml, quadratic DoS): commitlint>cosmiconfig>js-yaml
#     — runs only on developer commits against trusted local config, not at runtime.
#   - GHSA-vmh5-mc38-953g (undici, TLS cert validation bypass via SOCKS5 ProxyAgent):
#     apps/edge>wrangler>miniflare>undici (local dev edge runtime) and
#     apps/mobile>jsdom>undici (vitest test runner) — dev/test-only, not in the
#     deployed Worker runtime. Patched in undici@7.28.0.
#   - GHSA-pr7r-676h-xcf6 (undici, cross-user disclosure via shared cache bypass):
#     same dev/test-only paths as above (wrangler/miniflare local dev, jsdom under
#     vitest) — not in the deployed Worker runtime. Patched in undici@7.28.0.
auditConfig:
  ignoreGhsas:
    - GHSA-gv7w-rqvm-qjhr
    - GHSA-96hv-2xvq-fx4p
    - GHSA-fx2h-pf6j-xcff
    - GHSA-v6wh-96g9-6wx3
    - GHSA-h67p-54hq-rp68
    - GHSA-vmh5-mc38-953g
    - GHSA-pr7r-676h-xcf6
onlyBuiltDependencies:
  - '@sentry/cli'
  - esbuild
  - sharp
  - workerd
# Human-approved (2026-06-18): the `playwright` package ships a postinstall that
# downloads browser binaries. We keep installs scriptless and fetch browsers
# explicitly via `pnpm --filter @tinytinkerer/e2e e2e:install` (playwright install
# --with-deps chromium) in CI and locally, so the lifecycle script is intentionally
# blocked here rather than run at install time. See docs/e2e-testing.md (§6).
ignoredBuiltDependencies:
  - playwright
