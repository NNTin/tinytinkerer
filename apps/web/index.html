<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- In-browser translation (e.g. Google Translate) rewrites text nodes into
         <font> wrappers, detaching nodes React owns; React's next removeChild then
         throws "NotFoundError: ... not a child of this node" (TINYTINKERER-FRONTEND-6).
         Opt the React-managed shell out of automatic translation. -->
    <meta name="google" content="notranslate" />
    <title>web</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f2ec;
        --panel: #fffaf5;
        --muted: #766a5d;
        --border: #dccdb9;
        --text: #2f2923;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, #fff5e8 0%, var(--bg) 42%);
        color: var(--text);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      .tt-boot {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 16px;
      }

      .tt-boot__card {
        width: min(100%, 640px);
        border: 1px solid var(--border);
        border-radius: 32px;
        background: var(--panel);
        padding: 24px;
        box-shadow: 0 24px 80px rgba(47, 41, 35, 0.08);
      }

      .tt-boot__eyebrow {
        margin: 24px 0 8px;
        font-size: 11px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .tt-boot__title {
        margin: 0;
        font-size: 28px;
      }

      .tt-boot__body {
        margin: 12px 0 0;
        font-size: 14px;
        line-height: 1.7;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="tt-boot">
        <div class="tt-boot__card">
          <div>● ● ●</div>
          <p class="tt-boot__eyebrow">Workspace Boot</p>
          <h1 class="tt-boot__title">Loading tinytinkerer</h1>
          <p class="tt-boot__body">Preparing the web shell before the chat runtime hydrates.</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
