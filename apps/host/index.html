<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- In-browser translation (e.g. Google Translate) rewrites text nodes into
         <font> wrappers, detaching nodes React owns; React's next removeChild then
         throws "NotFoundError". Opt the React-managed shell out of translation. -->
    <meta name="google" content="notranslate" />
    <title>tinytinkerer</title>
    <style>
      :root {
        color-scheme: light;
        --host-bg: #f4f2ec;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top right, #f1e3c2 0%, transparent 30%),
          linear-gradient(180deg, #fbfaf7 0%, var(--host-bg) 100%);
        color: #25231d;
        font-family: 'IBM Plex Sans', ui-sans-serif, system-ui, sans-serif;
      }

      .tt-boot {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
      }

      .tt-boot__card {
        width: min(100%, 420px);
        border: 1px solid #d7d4ca;
        border-radius: 32px;
        background: #fffdf8;
        padding: 24px;
        box-shadow: 0 24px 70px rgba(36, 33, 24, 0.14);
      }

      .tt-boot__eyebrow {
        margin: 0 0 8px;
        font-size: 11px;
        letter-spacing: 0.26em;
        text-transform: uppercase;
        color: #6c675a;
      }

      .tt-boot__title {
        margin: 0;
        font-size: 24px;
      }

      .tt-boot__body {
        margin: 12px 0 0;
        font-size: 14px;
        line-height: 1.7;
        color: #6c675a;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="tt-boot">
        <div class="tt-boot__card">
          <p class="tt-boot__eyebrow">Workspace Boot</p>
          <h1 class="tt-boot__title">Loading tinytinkerer</h1>
          <p class="tt-boot__body">Bringing the shared chat App online across all three shells.</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
